spring:
  datasource:
    url: jdbc:mysql://localhost:3306/crypto_trader?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false
    username: root
    password: my-secret-pw
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          batch_size: 20

crypto:
  # 关注交易对（策略执行与数据采集都会用到）
  watch-list: BTCUSDT, ETHUSDT, SOLUSDT

  exchange:
    okx:
      api-key: ${OKX_API_KEY:}
      secret-key: ${OKX_SECRET_KEY:}
      passphrase: ${OKX_PASSPHRASE:}
      base-url: https://www.okx.com

  glassnode:
    api-key: ${GLASSNODE_API_KEY:}
    base-url: https://api.glassnode.com

  mcp:
    enabled: false
    provider: openai
    api-key: ${MCP_API_KEY:}
    base-url: https://api.openai.com/v1/chat/completions
    model: gpt-4
    timeout-seconds: 30

  notifier:
    telegram:
      bot-token: ${TELEGRAM_BOT_TOKEN:}
      chat-id: ${TELEGRAM_CHAT_ID:}
    email:
      from: ${MAIL_FROM:}
      to: ${MAIL_TO:}

  trading:
    # paper: 仅日志，不真实下单；live: 触发 OrderExecutor
    mode: paper
    max-position-size-usdt: 1000
    max-daily-trades: 10
